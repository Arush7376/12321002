services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backend_track}
      POSTGRES_USER: ${POSTGRES_USER:-backend_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backend_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backend_user} -d ${POSTGRES_DB:-backend_track}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  django:
    build: .
    env_file:
      - .env
    command: >
      sh -c "python vehicle_maintenance_scheduler/manage.py migrate &&
             gunicorn vehicle_maintenance_scheduler.src.config.wsgi:application
             --chdir /app/vehicle_maintenance_scheduler
             --bind 0.0.0.0:8000
             --workers 3"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    env_file:
      - .env
    command: celery -A src.config worker --loglevel=info
    working_dir: /app/vehicle_maintenance_scheduler
    volumes:
      - .:/app
    depends_on:
      - django
      - redis
      - postgres

volumes:
  postgres_data:
  redis_data:
